name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux audio build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: python3 -m pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  unit:
    name: Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux audio build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            decoder -> decoder/target
            audiolib -> audiolib/target
            rigctl -> rigctl/target
            ft8rx -> ft8rx/target

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python harness tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -q

      - name: Decoder tests
        run: cargo test --manifest-path decoder/Cargo.toml --lib --bins

      - name: Audio library tests
        run: cargo test --manifest-path audiolib/Cargo.toml

      - name: Rig control tests
        run: cargo test --manifest-path rigctl/Cargo.toml

      - name: FT8RX tests
        run: cargo test --manifest-path ft8rx/Cargo.toml

  decoder-distilled:
    name: Decoder distilled and SNR regressions
    runs-on: ubuntu-24.04
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            decoder -> decoder/target

      - name: FT4/FT2 distilled mixed regression fixtures
        run: >
          cargo test
          --manifest-path decoder/Cargo.toml
          --test distilled_regressions
          -- --test-threads=1

      - name: Weak-signal decoder SNR regressions
        run: >
          cargo test
          --manifest-path decoder/Cargo.toml
          --test snr_regressions
          -- --test-threads=1
